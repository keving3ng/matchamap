version: 2
updates:
  # Monorepo: single root package-lock.json (npm workspaces). Dependabot must target "/".
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 8
    groups:
      react:
        patterns:
          - "react*"
          - "@types/react*"
      cloudflare:
        patterns:
          - "wrangler"
          - "@cloudflare/*"
      drizzle:
        patterns:
          - "drizzle*"
      testing:
        patterns:
          - "@testing-library/*"
          - "vitest"
          - "@vitest/*"
          - "jsdom"
          - "@playwright/*"
      development-dependencies:
        dependency-type: "development"
        update-types:
          - "minor"
          - "patch"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 3
