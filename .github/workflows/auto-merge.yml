name: Auto Merge

on:
  # Trigger when PR is labeled, new commits pushed, or reopened
  pull_request:
    types: [labeled, synchronize, reopened]

  # Trigger when the CI workflow completes (non-blocking!)
  workflow_run:
    workflows: ["CI"]
    types: [completed]

  # Trigger when checks complete (backup)
  check_suite:
    types: [completed]

  # Trigger when PR is approved
  pull_request_review:
    types: [submitted]

jobs:
  auto-merge:
    name: Auto Merge PR
    runs-on: ubuntu-latest

    permissions:
      contents: write # Required to merge PRs
      pull-requests: write # Required to read reviews and add comments
      checks: read # Required to read check runs

    steps:
      - name: Get PR details
        id: pr
        uses: actions/github-script@v8
        with:
          script: |
            // Find the PR associated with this event
            let pr;

            if (context.eventName === 'pull_request' || context.eventName === 'pull_request_review') {
              pr = context.payload.pull_request;
            } else if (context.eventName === 'workflow_run' || context.eventName === 'check_suite') {
              // Find PRs associated with this workflow run or check suite
              const headBranch = context.eventName === 'workflow_run'
                ? context.payload.workflow_run.head_branch
                : context.payload.check_suite.head_branch;

              const { data: prs } = await github.rest.pulls.list({
                owner: context.repo.owner,
                repo: context.repo.repo,
                state: 'open',
                head: `${context.repo.owner}:${headBranch}`
              });

              if (prs.length === 0) {
                core.info(`No open PRs found for branch ${headBranch}`);
                return;
              }

              pr = prs[0];
            }

            if (!pr) {
              core.info('No PR found');
              return;
            }

            // Check if PR has auto-merge label
            const hasAutoMergeLabel = pr.labels.some(label => label.name === 'auto-merge');

            if (!hasAutoMergeLabel) {
              core.info(`PR #${pr.number} does not have auto-merge label - skipping`);
              return;
            }

            core.info(`✓ Found PR #${pr.number} with auto-merge label`);
            core.setOutput('number', pr.number);
            core.setOutput('sha', pr.head.sha);
            return pr.number;

      - name: Check CI status
        id: ci
        if: steps.pr.outputs.number
        uses: actions/github-script@v8
        with:
          script: |
            const prNumber = ${{ steps.pr.outputs.number }};
            const sha = '${{ steps.pr.outputs.sha }}';

            // Get check runs for the PR
            const { data: checkRuns } = await github.rest.checks.listForRef({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: sha
            });

            // Get status checks for the PR
            const { data: statuses } = await github.rest.repos.getCombinedStatusForRef({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: sha
            });

            // Required check names (based on your ci.yml workflow)
            const requiredChecks = [
              'Static Analysis',
              'Frontend Tests',
              'Build',
              'CI Success'
            ];

            // Check status of each required check
            const checkStatuses = {};
            let allPassed = true;
            let anyPending = false;

            for (const checkName of requiredChecks) {
              const checkRun = checkRuns.check_runs.find(run => run.name === checkName);

              if (!checkRun) {
                core.info(`⏳ ${checkName}: not started yet`);
                checkStatuses[checkName] = 'pending';
                anyPending = true;
                allPassed = false;
              } else if (checkRun.status !== 'completed') {
                core.info(`⏳ ${checkName}: running...`);
                checkStatuses[checkName] = 'in_progress';
                anyPending = true;
                allPassed = false;
              } else if (checkRun.conclusion !== 'success') {
                core.info(`❌ ${checkName}: ${checkRun.conclusion}`);
                checkStatuses[checkName] = checkRun.conclusion;
                allPassed = false;
              } else {
                core.info(`✓ ${checkName}: passed`);
                checkStatuses[checkName] = 'success';
              }
            }

            if (anyPending) {
              core.info(`⏸️  PR #${prNumber} has pending CI checks - will auto-merge when CI completes`);
              core.setOutput('passed', 'false');
              return false;
            }

            if (!allPassed) {
              core.info(`❌ PR #${prNumber} has failing CI checks - auto-merge blocked`);
              core.setOutput('passed', 'false');
              return false;
            }

            // Also check combined status (for other integrations)
            if (statuses.state === 'pending') {
              core.info(`⏸️  PR #${prNumber} has pending status checks - will auto-merge when complete`);
              core.setOutput('passed', 'false');
              return false;
            }

            if (statuses.state !== 'success' && statuses.total_count > 0) {
              core.info(`❌ PR #${prNumber} has failing status checks - auto-merge blocked`);
              core.setOutput('passed', 'false');
              return false;
            }

            core.info(`✓ All CI checks passed for PR #${prNumber}`);
            core.setOutput('passed', 'true');
            return true;

      - name: Merge PR
        if: |
          steps.pr.outputs.number &&
          steps.ci.outputs.passed == 'true'
        uses: actions/github-script@v8
        with:
          script: |
            const prNumber = ${{ steps.pr.outputs.number }};

            try {
              await github.rest.pulls.merge({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: prNumber,
                merge_method: 'squash',
                commit_title: `Auto-merge PR #${prNumber}`,
              });

              core.info(`✅ Successfully merged PR #${prNumber}`);

              // Add a comment to the PR
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body: '✅ Auto-merged after all checks passed and approval was received.'
              });
            } catch (error) {
              core.setFailed(`Failed to merge PR: ${error.message}`);
            }
