name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  test:
    name: Test & Build
    runs-on: self-hosted
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Run type checking
        run: npm run typecheck

      - name: Run linter
        run: npm run lint:ci
        continue-on-error: true

      - name: Run security audit
        run: npm audit --audit-level=high --production
        continue-on-error: true

      - name: Run frontend tests
        run: npm test -- --run --reporter=verbose

      - name: Run backend tests
        run: npm run test:ci --workspace=backend
        continue-on-error: true

      - name: Generate test coverage
        run: npm run test:coverage --workspace=frontend
        continue-on-error: true

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        if: always()
        with:
          files: ./frontend/coverage/coverage-final.json
          flags: frontend
          token: ${{ secrets.CODECOV_TOKEN }}
        continue-on-error: true

      - name: Run build
        run: npm run build

      - name: Check bundle size
        run: |
          echo "📦 Frontend bundle sizes:"
          du -sh frontend/dist/* | sort -h
          echo ""
          echo "📊 Total frontend bundle size:"
          du -sh frontend/dist

      - name: Test Summary
        if: always()
        run: |
          if [ $? -eq 0 ]; then
            echo "✅ All checks passed!"
          else
            echo "❌ Some checks failed. Please review the logs above."
            exit 1
          fi
