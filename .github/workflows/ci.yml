name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  # ============================================================================
  # PHASE 1: PARALLEL CRITICAL CHECKS
  # TypeScript type checking - critical path for build
  # ============================================================================
  typecheck:
    name: TypeScript Type Checking
    runs-on: self-hosted
    timeout-minutes: 3

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Run type checking
        run: npm run typecheck

  # ============================================================================
  # PARALLEL STATIC ANALYSIS (Non-blocking for build)
  # ============================================================================
  lint:
    name: Linting
    runs-on: self-hosted
    timeout-minutes: 3

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Run linter
        run: npm run lint:ci
        continue-on-error: true  # Don't block on lint warnings

  security-audit:
    name: Security Audit
    runs-on: self-hosted
    timeout-minutes: 2

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Run security audit
        run: npm audit --audit-level=high --production
        continue-on-error: true  # Don't block on audit findings

  # ============================================================================
  # FRONTEND TESTS (Chunked for parallel execution)
  # 1079 tests split into 4 shards for ~4-5 min time savings
  # ============================================================================
  frontend-tests:
    name: Frontend Tests (Shard ${{ matrix.shard }})
    needs: [typecheck]  # Ensure TypeScript compiles before running tests
    runs-on: self-hosted
    timeout-minutes: 5
    strategy:
      matrix:
        shard: [1, 2, 3, 4]
      fail-fast: false  # Run all shards even if one fails

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Run frontend tests (shard ${{ matrix.shard }}/4)
        run: npm run test:coverage --workspace=frontend -- --shard=${{ matrix.shard }}/4

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        if: always()
        with:
          files: ./frontend/coverage/coverage-final.json
          flags: frontend-shard-${{ matrix.shard }}
          token: ${{ secrets.CODECOV_TOKEN }}
        continue-on-error: true

      - name: Upload test results to Codecov
        uses: codecov/test-results-action@v1
        if: ${{ !cancelled() }}
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
        continue-on-error: true

  # ============================================================================
  # BACKEND TESTS
  # Fixed: removed continue-on-error to properly fail CI on test failures
  # ============================================================================
  backend-tests:
    name: Backend Tests
    needs: [typecheck]  # Ensure TypeScript compiles before running tests
    runs-on: self-hosted
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Run backend tests
        run: npm run test:ci --workspace=backend
        # Removed continue-on-error - backend tests should now fail CI if they fail

  # ============================================================================
  # BUILD (Only depends on typecheck, not lint/audit)
  # Starts ~2-3 minutes earlier than before
  # ============================================================================
  build:
    name: Build
    runs-on: self-hosted
    needs: [typecheck]  # Only needs typecheck to pass!
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Run build
        run: npm run build

  # ============================================================================
  # NOTE: ci-success job removed
  # GitHub's native status checks are sufficient - configure branch protection
  # to require: typecheck, lint, security-audit, frontend-tests, backend-tests, build
  # ============================================================================
