name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  # Static analysis jobs that can run in parallel
  static-analysis:
    name: Static Analysis
    runs-on: self-hosted
    timeout-minutes: 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Run type checking
        run: npm run typecheck

      - name: Run linter
        run: npm run lint:ci
        continue-on-error: true

      - name: Run security audit
        run: npm audit --audit-level=high --production
        continue-on-error: true

  # Frontend tests with coverage
  frontend-tests:
    name: Frontend Tests
    runs-on: self-hosted
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Run frontend tests with coverage
        run: npm run test:coverage --workspace=frontend

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        if: always()
        with:
          files: ./frontend/coverage/coverage-final.json
          flags: frontend
          token: ${{ secrets.CODECOV_TOKEN }}
        continue-on-error: true

  # Backend tests
  backend-tests:
    name: Backend Tests
    runs-on: self-hosted
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Run backend tests
        run: npm run test:ci --workspace=backend
        continue-on-error: true

  # Build job (depends on static-analysis passing)
  build:
    name: Build
    runs-on: self-hosted
    needs: [static-analysis]
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Run build
        run: npm run build

      - name: Check bundle size
        run: |
          echo "📦 Frontend bundle sizes:"
          du -sh frontend/dist/* | sort -h
          echo ""
          echo "📊 Total frontend bundle size:"
          du -sh frontend/dist

  # Summary job to ensure all required jobs passed
  ci-success:
    name: CI Success
    runs-on: self-hosted
    needs: [static-analysis, frontend-tests, build]
    if: always()

    steps:
      - name: Check all jobs status
        run: |
          if [ "${{ needs.static-analysis.result }}" != "success" ]; then
            echo "❌ Static analysis failed"
            exit 1
          fi
          if [ "${{ needs.frontend-tests.result }}" != "success" ]; then
            echo "❌ Frontend tests failed"
            exit 1
          fi
          if [ "${{ needs.build.result }}" != "success" ]; then
            echo "❌ Build failed"
            exit 1
          fi
          echo "✅ All required checks passed!"
