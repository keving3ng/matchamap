name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  # ============================================================================
  # SHARED SETUP JOB
  # Install dependencies once and cache for all subsequent jobs
  # Saves ~5-6 minutes per workflow run by eliminating repeated npm installs
  # ============================================================================
  setup:
    name: Setup & Install Dependencies
    runs-on: self-hosted
    timeout-minutes: 3
    outputs:
      cache-hit: ${{ steps.cache-node-modules.outputs.cache-hit }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node & Dependencies
        uses: ./.github/actions/setup-node-deps

  # ============================================================================
  # PHASE 1: PARALLEL CRITICAL CHECKS
  # TypeScript type checking - critical path for build
  # ============================================================================
  typecheck:
    name: TypeScript Type Checking
    needs: [setup]
    runs-on: self-hosted
    timeout-minutes: 3

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node & Dependencies
        uses: ./.github/actions/setup-node-deps

      - name: Run type checking
        run: npm run typecheck

  # ============================================================================
  # PARALLEL STATIC ANALYSIS (Non-blocking for build)
  # ============================================================================
  lint:
    name: Linting
    needs: [setup]
    runs-on: self-hosted
    timeout-minutes: 3

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node & Dependencies
        uses: ./.github/actions/setup-node-deps

      - name: Run linter
        run: npm run lint:ci
        continue-on-error: true  # Don't block on lint warnings

  security-audit:
    name: Security Audit
    needs: [setup]
    runs-on: self-hosted
    timeout-minutes: 2
    # Only run on main branch or when dependencies change
    if: |
      github.ref == 'refs/heads/main' ||
      contains(github.event.head_commit.modified, 'package.json') ||
      contains(github.event.head_commit.modified, 'package-lock.json') ||
      contains(github.event.head_commit.modified, 'backend/package.json') ||
      contains(github.event.head_commit.modified, 'backend/package-lock.json')

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node & Dependencies
        uses: ./.github/actions/setup-node-deps

      - name: Run security audit
        run: npm audit --audit-level=high --production
        continue-on-error: true  # Don't block on audit findings

  # ============================================================================
  # FRONTEND TESTS (Chunked for parallel execution)
  # 1079 tests split into 4 shards for ~4-5 min time savings
  # PRs: run without coverage for speed
  # Main: run with coverage for tracking
  # ============================================================================
  frontend-tests:
    name: Frontend Tests (Shard ${{ matrix.shard }})
    needs: [setup, typecheck]  # Ensure dependencies are installed and TypeScript compiles
    runs-on: self-hosted
    timeout-minutes: 5
    strategy:
      matrix:
        shard: [1, 2, 3, 4]
      fail-fast: false  # Run all shards even if one fails

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node & Dependencies
        uses: ./.github/actions/setup-node-deps

      - name: Run frontend tests (shard ${{ matrix.shard }}/4) - without coverage
        if: github.ref != 'refs/heads/main'
        run: npm test --workspace=frontend -- --shard=${{ matrix.shard }}/4

      - name: Run frontend tests (shard ${{ matrix.shard }}/4) - with coverage
        if: github.ref == 'refs/heads/main'
        run: npm run test:coverage --workspace=frontend -- --shard=${{ matrix.shard }}/4

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        if: github.ref == 'refs/heads/main' && always()
        with:
          files: ./frontend/coverage/coverage-final.json
          flags: frontend-shard-${{ matrix.shard }}
          token: ${{ secrets.CODECOV_TOKEN }}
        continue-on-error: true

      - name: Upload test results to Codecov
        uses: codecov/test-results-action@v1
        if: github.ref == 'refs/heads/main' && !cancelled()
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
        continue-on-error: true

  # ============================================================================
  # BACKEND TESTS
  # Fixed: removed continue-on-error to properly fail CI on test failures
  # Note: Uses ubuntu-latest instead of self-hosted due to GLIBC requirements
  #       for @cloudflare/workerd-linux-64 (requires GLIBC 2.32-2.35)
  # ============================================================================
  backend-tests:
    name: Backend Tests
    needs: [setup, typecheck]  # Ensure dependencies are installed and TypeScript compiles
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node & Dependencies
        uses: ./.github/actions/setup-node-deps

      - name: Run backend tests
        run: npm run test:ci --workspace=backend
        # Removed continue-on-error - backend tests should now fail CI if they fail

  # ============================================================================
  # BUILD (Only on main branch - verification before deployment)
  # Starts ~2-3 minutes earlier than before
  # ============================================================================
  build:
    name: Build
    runs-on: self-hosted
    needs: [setup, typecheck]  # Ensure dependencies are installed and typecheck passes
    timeout-minutes: 10
    # Only run on main branch pushes
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node & Dependencies
        uses: ./.github/actions/setup-node-deps

      - name: Run build
        run: npm run build

  # ============================================================================
  # DEPLOY BACKEND (Only on main branch after all checks pass)
  # Consolidates deploy-backend.yml workflow to avoid duplicate checks
  # ============================================================================
  deploy-backend:
    name: Deploy Backend to Production
    runs-on: self-hosted
    needs: [typecheck, backend-tests, build]  # Wait for all critical checks
    timeout-minutes: 5
    # Only deploy on main branch pushes (not PRs)
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node & Dependencies
        uses: ./.github/actions/setup-node-deps

      - name: Apply database migrations
        run: cd backend && npm run db:migrate:prod
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - name: Deploy to Cloudflare Workers
        run: cd backend && npx wrangler deploy --env=""
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - name: Deployment status
        run: |
          echo "✅ Database migrations applied successfully"
          echo "✅ Backend successfully deployed to production"
          echo "🔗 API URL: https://matchamap-api-production.keving3ng.workers.dev"

  # ============================================================================
  # NOTE: ci-success job removed
  # GitHub's native status checks are sufficient - configure branch protection
  # to require: typecheck, lint, security-audit, frontend-tests, backend-tests, build
  # ============================================================================
