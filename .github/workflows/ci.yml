name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

# PRs: cancel superseded runs (saves minutes). Main: never cancel (avoid interrupting deploy).
concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

# Minimal scopes: fork PRs never receive repository secrets; token is only for artifacts + checkout.
permissions:
  contents: read
  actions: write # upload-artifact (JUnit for debugging / agents)

jobs:
  ci:
    name: CI
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Setup Node & Dependencies
        uses: ./.github/actions/setup-node-deps

      - name: TypeScript type checking
        run: npm run typecheck

      - name: Lint (GitHub annotations)
        run: npm run lint:ci --workspace=frontend -- -f gha
        continue-on-error: true

      - name: Security audit
        run: npm audit --audit-level=high --production
        continue-on-error: true

      - name: Frontend tests
        if: github.ref != 'refs/heads/main'
        run: npm run test:ci --workspace=frontend

      - name: Frontend tests (coverage)
        if: github.ref == 'refs/heads/main'
        run: npm run test:coverage --workspace=frontend

      - name: Backend tests
        run: npm run test:ci --workspace=backend

      - name: Build
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: npm run build

      - name: Apply database migrations
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: cd backend && npm run db:migrate:prod
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - name: Deploy to Cloudflare Workers
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: cd backend && npx wrangler deploy --env=""
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - name: Deployment status
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: |
          echo "✅ Database migrations applied successfully"
          echo "✅ Backend successfully deployed to production"
          echo "🔗 API URL: https://matchamap-api-production.keving3ng.workers.dev"

      - name: Upload Vitest JUnit (frontend)
        if: failure()
        continue-on-error: true
        uses: actions/upload-artifact@v7
        with:
          name: vitest-junit-frontend
          path: frontend/test-results/junit.xml
          if-no-files-found: ignore

      - name: CI failure summary
        if: failure()
        run: |
          echo "::error::CI failed — see the failing step above."
          echo "If frontend tests ran, JUnit may be available under Actions → this run → Artifacts (vitest-junit-frontend)."
