name: Deploy Backend to Cloudflare Workers

on:
  push:
    branches: [main]
    paths: ["backend/**"]
  workflow_dispatch: # Allow manual triggering

jobs:
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest

    # Security: Only run on main branch
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: cd backend && npm ci --ignore-scripts

      - name: Type check
        run: cd backend && npm run typecheck

      - name: Apply database migrations
        run: cd backend && npm run db:migrate:prod
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - name: Deploy to Cloudflare Workers
        run: cd backend && npx wrangler deploy --env=""
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - name: Deployment status
        run: |
          echo "✅ Database migrations applied successfully"
          echo "✅ Backend successfully deployed to production"
          echo "🔗 API URL: https://matchamap-api-production.keving3ng.workers.dev"
