name = "matchamap-api"
main = "src/index.ts"
compatibility_date = "2025-09-30"

[dev]
port = 8787

# D1 Database binding
[[d1_databases]]
binding = "DB"
database_name = "matchamap-db"
database_id = "69667043-3d25-4fe2-9bac-1a8d42a7c25c"
migrations_dir = "drizzle/migrations"

# Environment variables
[vars]
ENVIRONMENT = "development"
ALLOWED_ORIGINS = "http://localhost:3000,http://localhost:5173,http://localhost:5174"
# SECURITY: API keys should be set as secrets, not committed to git
# Set locally with: npx wrangler secret put GOOGLE_PLACES_API_KEY
# For development, you can use .dev.vars file (which is gitignored)
JWT_SECRET = "dev-secret-change-in-production-use-wrangler-secret"  # For local development only

# Production environment
[env.production]
# Use same worker name, different environment
vars = { ENVIRONMENT = "production", ALLOWED_ORIGINS = "https://matchamap.pages.dev,https://matchamap-api.kevingeng33.workers.dev" }
# SECURITY: JWT_SECRET MUST be set as a Wrangler secret in production
# NEVER commit JWT_SECRET to git - it must be set via Wrangler CLI:
# Run: npx wrangler secret put JWT_SECRET --env production
# Generate a secure secret with: openssl rand -base64 32
#
# IMPORTANT: The JWT_SECRET in the [vars] section above is for LOCAL DEV ONLY
# Production MUST use the secret set via 'wrangler secret put'
