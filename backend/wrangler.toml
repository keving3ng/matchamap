# PRODUCTION is the default deployment target
# To deploy: npx wrangler deploy (no --env flag needed)
name = "matchamap-api-production"
main = "src/index.ts"
compatibility_date = "2025-09-30"
compatibility_flags = ["nodejs_compat"]

[dev]
port = 8787

# D1 Database binding (production database)
[[d1_databases]]
binding = "DB"
database_name = "matchamap-db"
database_id = "69667043-3d25-4fe2-9bac-1a8d42a7c25c"
migrations_dir = "drizzle/migrations"

# R2 bucket for photo storage
[[r2_buckets]]
binding = "PHOTOS_BUCKET"
bucket_name = "matchamap-photos"
preview_bucket_name = "matchamap-photos-dev"

# Production environment variables (default)
[vars]
ENVIRONMENT = "production"
ALLOWED_ORIGINS = "https://matchamap.club,https://*.matchamap.club,https://matchamap.pages.dev,https://*.matchamap.pages.dev,http://localhost:3000,http://localhost:5174"
# COOKIE_DOMAIN: Set this when using a custom subdomain (e.g., api.matchamap.club)
# to allow cookie sharing between frontend and backend on different subdomains
COOKIE_DOMAIN = ".matchamap.club"

# SECURITY: Required secrets (set via Wrangler CLI)
# NEVER commit secrets to git - they must be set via Wrangler CLI:
#
# JWT_SECRET (required):
#   Generate: openssl rand -base64 32
#   Set: npx wrangler secret put JWT_SECRET
#
# GOOGLE_PLACES_API_KEY (required):
#   Get from: https://console.cloud.google.com/apis/credentials
#   Enable: Places API (New)
#   Restrict to: Places API only (for security)
#   Set: npx wrangler secret put GOOGLE_PLACES_API_KEY

# Development environment (for testing deployments before production)
[env.dev]
name = "matchamap-api-dev"
vars = { ENVIRONMENT = "development", ALLOWED_ORIGINS = "http://localhost:3000" }

# SECURITY: Development secrets must also be set via Wrangler CLI
# Do not use hardcoded secrets even in development
# Set: npx wrangler secret put JWT_SECRET --env dev
# Set: npx wrangler secret put GOOGLE_PLACES_API_KEY --env dev

# D1 Database binding for dev environment (same database)
[[env.dev.d1_databases]]
binding = "DB"
database_name = "matchamap-db"
database_id = "69667043-3d25-4fe2-9bac-1a8d42a7c25c"

# R2 bucket for dev environment
[[env.dev.r2_buckets]]
binding = "PHOTOS_BUCKET"
bucket_name = "matchamap-photos-dev"
preview_bucket_name = "matchamap-photos-dev"
