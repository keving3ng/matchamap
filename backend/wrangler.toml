name = "matchamap-api"
main = "src/index.ts"
compatibility_date = "2025-09-30"

# D1 Database binding
[[d1_databases]]
binding = "DB"
database_name = "matchamap-db"
database_id = "69667043-3d25-4fe2-9bac-1a8d42a7c25c"
migrations_dir = "drizzle/migrations"

# Environment variables
[vars]
ENVIRONMENT = "development"
ALLOWED_ORIGINS = "http://localhost:3000,http://localhost:5173,http://localhost:5174"
GOOGLE_PLACES_API_KEY = "AIzaSyALvcACvh6wktGtNYS5ctd-jg3QdLHx2n8"  # Replace with your actual API key

# Production environment
[env.production]
name = "matchamap-api-production"
vars = { ENVIRONMENT = "production", ALLOWED_ORIGINS = "https://matchamap.pages.dev,https://*.matchamap.pages.dev" }
