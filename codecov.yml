coverage:
  status:
    project:
      default:
        target: 80%
        threshold: 2%
    patch:
      default:
        target: 80%
        threshold: 2%

comment:
  layout: "header, diff, flags, components"
  behavior: default
  require_changes: false

flags:
  frontend:
    paths:
      - frontend/src/
  backend:
    paths:
      - backend/src/

ignore:
  - "frontend/src/test/"
  - "backend/src/test/"
  - "**/*.d.ts"
  - "**/*.config.*"
  - "**/node_modules/"
  - "dist/"
  - "coverage/"
  - "drizzle/"
  - "scripts/"