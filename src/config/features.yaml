# Feature Flags Configuration
# Controls which features are enabled in development and production environments

# Matcha Passport - Visit tracking system
# Allows users to track which cafes they've visited with a digital stamp collection
ENABLE_PASSPORT:
  dev: false
  prod: false

# News Feed - Updates and announcements
# Displays latest cafe additions, score updates, and matcha-related announcements
ENABLE_FEED:
  dev: true
  prod: true

# Search Functionality
# Allows users to search for cafes by name, neighborhood, or other criteria
ENABLE_SEARCH:
  dev: true
  prod: true

# Geolocation Services
# Enables user location detection and distance calculations from cafes
ENABLE_GEOLOCATION:
  dev: true
  prod: true

# Admin Panel
# Internal tools for managing content and viewing analytics (dev only for security)
ENABLE_ADMIN_PANEL:
  dev: true
  prod: false

# Coming Soon Page
# Password-protected splash page shown before public launch
SHOW_COMING_SOON:
  dev: false
  prod: true

# Events Page - Community gatherings and workshops
# Displays upcoming matcha-related events, workshops, and festivals in Toronto
ENABLE_EVENTS:
  dev: true
  prod: false

# Hamburger Menu
# Top-right navigation menu for additional features and settings
ENABLE_MENU:
  dev: true
  prod: false

# City Selector
# Dropdown to select different cities (Toronto, Montreal, Tokyo)
ENABLE_CITY_SELECTOR:
  dev: true
  prod: false

# User Accounts
# User authentication and account features like favoriting cafes
ENABLE_USER_ACCOUNTS:
  dev: false
  prod: false

# Contact Us Page
# Contact form and information for users to reach out
ENABLE_CONTACT:
  dev: true
  prod: false

# About Us Page
# Information about the project, mission, and reviewer
ENABLE_ABOUT:
  dev: true
  prod: false

# Store/Shop Page
# E-commerce page for matcha-related products and merch
ENABLE_STORE:
  dev: true
  prod: false

# Settings Page
# User preferences and app settings
ENABLE_SETTINGS:
  dev: true
  prod: false
